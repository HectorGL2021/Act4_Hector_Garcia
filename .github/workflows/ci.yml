name: CI/CD Pipeline - Flask Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------
  # Etapa 1: Ejecutar pruebas unitarias con pytest
  # -------------------------------------------------------
  test:
    name: Ejecutar Tests
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar pruebas con pytest
        run: pytest test_app.py -v

  # -------------------------------------------------------
  # Etapa 2: Construir la imagen Docker
  # -------------------------------------------------------
  build:
    name: Construir Imagen Docker
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Construir imagen Docker
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/act4-flask-app:latest .

  # -------------------------------------------------------
  # Etapa 3: Subir la imagen a Docker Hub
  # -------------------------------------------------------
  push:
    name: Subir Imagen a Docker Hub
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y etiquetar imagen Docker
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/act4-flask-app:latest .
          docker tag ${{ secrets.DOCKER_USERNAME }}/act4-flask-app:latest ${{ secrets.DOCKER_USERNAME }}/act4-flask-app:${{ github.sha }}

      - name: Subir imagen a Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/act4-flask-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/act4-flask-app:${{ github.sha }}
